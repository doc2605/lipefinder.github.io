name: Deploy Vite React to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4   # 👈 atualizado

      - name: Instalar Node
        uses: actions/setup-node@v4  # 👈 atualizado
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Buildar projeto
        run: npm run build

      - name: Upload do site
        uses: actions/upload-pages-artifact@v3  # 👈 atualizado
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4  # 👈 atualizado
